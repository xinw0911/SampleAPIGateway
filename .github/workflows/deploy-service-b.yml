name: Deploy Service B

on:
  push:
    branches:
      - main
    paths:
      - 'lib/service-b-stack.ts'
      - 'assets/lambda-functions/service_b_handler.js'
      - 'lib/models/service-a-models.ts'
      - '.github/workflows/deploy-service-b.yml'
      - '.github/workflows/deploy-stack.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-service-b:
    uses: ./.github/workflows/deploy-stack.yml
    with:
      stack-name: ServiceBStack
      stack-prefix: service-b
      environment: prod
    secrets:
      AWS_ROLE_ARN: arn:aws:iam::834197531540:role/testgithub
      AWS_REGION: us-west-2
