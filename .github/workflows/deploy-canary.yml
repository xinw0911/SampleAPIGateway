name: Deploy Canary

on:
  push:
    branches:
      - main
    paths:
      - 'lib/canary-stack.ts'
      - 'assets/lambda-functions/canary_handler.js'
      - '.github/workflows/deploy-canary.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-canary:
    uses: ./.github/workflows/deploy-stack.yml
    with:
      stack-name: CanaryStack
      stack-prefix: canary
      environment: prod
    secrets:
      AWS_ROLE_ARN: arn:aws:iam::834197531540:role/testgithub
      AWS_REGION: us-west-2
