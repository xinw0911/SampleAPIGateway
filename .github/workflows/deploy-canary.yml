name: Deploy Canary

on:
  push:
    branches:
      - main
    paths:
      - 'lib/canary-stack.ts'
      - 'assets/lambda-functions/canary_handler.js'
      - '.github/workflows/deploy-canary.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Service B"]
    types:
      - completed

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run if Service B workflow succeeded or if manually triggered
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Canary Stack
        run: npx cdk deploy CanaryStack --require-approval never

      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          ALARM_NAME=$(aws cloudformation describe-stacks \
            --stack-name canary-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`CanaryAlarmName`].OutputValue' \
            --output text)
          FUNCTION_NAME=$(aws cloudformation describe-stacks \
            --stack-name canary-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`CanaryFunctionName`].OutputValue' \
            --output text)
          echo "alarm-name=$ALARM_NAME" >> $GITHUB_OUTPUT
          echo "function-name=$FUNCTION_NAME" >> $GITHUB_OUTPUT

      - name: Display Canary Stack Info
        run: |
          echo "Canary Stack deployed successfully!"
          echo "CloudWatch Alarm: ${{ steps.stack-outputs.outputs.alarm-name }}"
          echo "Lambda Function: ${{ steps.stack-outputs.outputs.function-name }}"
