name: Deploy Service A

on:
  push:
    branches:
      - main
    paths:
      - 'lib/service-a-stack.ts'
      - 'assets/lambda-functions/service_a_handler.js'
      - 'lib/models/service-a-models.ts'
      - '.github/workflows/deploy-service-a.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Service A Stack
        run: npx cdk deploy ServiceAStack --require-approval never

      - name: Get Stack Outputs
        id: stack-outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name service-a-stack \
            --query 'Stacks[0].Outputs[?OutputKey==`ServiceAApiUrl`].OutputValue' \
            --output text)
          echo "api-url=$API_URL" >> $GITHUB_OUTPUT

      - name: Display Service A API URL
        run: |
          echo "Service A deployed successfully!"
          echo "API URL: ${{ steps.stack-outputs.outputs.api-url }}"

      - name: Trigger Service B Deployment
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-service-b.yml',
              ref: context.ref
            });
            console.log('Triggered Service B deployment workflow');
